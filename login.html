<!DOCTYPE html>
<html lang="id">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Masuk — Checklist Sholat</title>
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link
        href="https://fonts.googleapis.com/css2?family=Plus+Jakarta+Sans:wght@400;500;600;700;800&family=Noto+Serif:ital,wght@0,400;0,700;1,400&display=swap"
        rel="stylesheet">
    <style>
        *,
        *::before,
        *::after {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        :root {
            --bg: #EEF0EC;
            --surface: #FFFFFF;
            --surface2: #F6F8F5;
            --teal: #1B6B5A;
            --teal-2: #24896F;
            --teal-light: #DCF0EA;
            --teal-mid: #4BA88F;
            --gold: #A07830;
            --gold-2: #C49A3C;
            --gold-light: #F9F2E2;
            --text: #1A2420;
            --text2: #4A6359;
            --text3: #8FAA9E;
            --border: rgba(27, 107, 90, 0.12);
            --shadow: 0 2px 12px rgba(27, 107, 90, 0.08);
            --shadow-md: 0 4px 20px rgba(27, 107, 90, 0.12);
            --shadow-lg: 0 8px 40px rgba(27, 107, 90, 0.18);
            --r: 18px;
            --r-sm: 12px;
        }

        body {
            font-family: 'Plus Jakarta Sans', sans-serif;
            background: var(--bg);
            min-height: 100vh;
            display: flex;
            justify-content: center;
            align-items: center;
            padding: 28px 16px;
        }

        body::before {
            content: '';
            position: fixed;
            inset: 0;
            background:
                radial-gradient(ellipse 700px 500px at 80% 0%, rgba(75, 168, 143, 0.10) 0%, transparent 70%),
                radial-gradient(ellipse 500px 400px at 5% 90%, rgba(160, 120, 48, 0.08) 0%, transparent 60%);
            pointer-events: none;
            z-index: 0;
        }

        .login-wrapper {
            width: 100%;
            max-width: 420px;
            display: flex;
            flex-direction: column;
            gap: 14px;
            position: relative;
            z-index: 1;
        }

        .header-card {
            background: var(--teal);
            border-radius: 26px;
            padding: 36px 26px 30px;
            text-align: center;
            position: relative;
            overflow: hidden;
            box-shadow: var(--shadow-lg);
        }

        .header-card::before {
            content: '';
            position: absolute;
            inset: 0;
            background:
                radial-gradient(circle at 15% 20%, rgba(255, 255, 255, 0.12) 0%, transparent 45%),
                radial-gradient(circle at 85% 80%, rgba(160, 120, 48, 0.18) 0%, transparent 45%);
        }

        .geo-deco {
            position: absolute;
            top: -30px;
            right: -30px;
            width: 180px;
            height: 180px;
            opacity: 0.06;
        }

        .geo-deco2 {
            position: absolute;
            bottom: -40px;
            left: -20px;
            width: 140px;
            height: 140px;
            opacity: 0.05;
        }

        .header-icon {
            font-size: 44px;
            display: block;
            position: relative;
            z-index: 1;
            margin-bottom: 10px;
            filter: drop-shadow(0 3px 10px rgba(0, 0, 0, 0.25));
            animation: floatIcon 3s ease-in-out infinite;
        }

        @keyframes floatIcon {
            0%, 100% { transform: translateY(0); }
            50% { transform: translateY(-5px); }
        }

        .header-card h1 {
            font-family: 'Noto Serif', serif;
            font-size: 26px;
            font-weight: 700;
            color: #fff;
            letter-spacing: 0.3px;
            position: relative;
            z-index: 1;
            margin-bottom: 6px;
        }

        .header-card p {
            font-size: 12.5px;
            color: rgba(255, 255, 255, 0.68);
            position: relative;
            z-index: 1;
            line-height: 1.6;
            max-width: 280px;
            margin: 0 auto;
        }

        .login-card {
            background: var(--surface);
            border-radius: var(--r);
            padding: 28px 24px;
            box-shadow: var(--shadow-md);
            border: 1px solid var(--border);
            animation: fadeUp 0.5s ease both;
            text-align: center;
        }

        .login-label {
            font-size: 11px;
            font-weight: 800;
            color: var(--text3);
            text-transform: uppercase;
            letter-spacing: 1.2px;
            margin-bottom: 18px;
        }

        .btn-google {
            width: 100%;
            padding: 14px 20px;
            background: var(--surface2);
            color: var(--text);
            border: 1.5px solid var(--border);
            border-radius: var(--r-sm);
            font-family: 'Plus Jakarta Sans', sans-serif;
            font-size: 14px;
            font-weight: 700;
            cursor: pointer;
            transition: all 0.22s ease;
            display: flex;
            align-items: center;
            justify-content: center;
            gap: 10px;
        }

        .btn-google:hover {
            border-color: var(--teal-mid);
            background: var(--teal-light);
            transform: translateY(-2px);
            box-shadow: var(--shadow-md);
        }

        .btn-google:active {
            transform: translateY(0);
        }

        .btn-google svg {
            flex-shrink: 0;
        }

        .divider {
            display: flex;
            align-items: center;
            gap: 12px;
            margin: 18px 0;
        }

        .divider::before,
        .divider::after {
            content: '';
            flex: 1;
            height: 1px;
            background: var(--border);
        }

        .divider span {
            font-size: 11px;
            font-weight: 700;
            color: var(--text3);
            text-transform: uppercase;
            letter-spacing: 0.5px;
        }

        .login-info {
            font-size: 12px;
            color: var(--text3);
            line-height: 1.6;
        }

        .login-status {
            margin-top: 14px;
            padding: 12px 16px;
            border-radius: var(--r-sm);
            font-size: 13px;
            font-weight: 700;
            text-align: center;
            border: 1.5px solid var(--border);
            background: var(--surface2);
            color: var(--text2);
            line-height: 1.5;
            display: none;
        }

        .login-status.error {
            display: block;
            background: #FFF0F0;
            border-color: #F5AAAA;
            color: #A03030;
        }

        .login-status.loading {
            display: block;
            background: var(--gold-light);
            border-color: rgba(160, 120, 48, 0.25);
            color: var(--gold);
        }

        .footer-note {
            text-align: center;
            font-size: 11px;
            color: var(--text3);
            line-height: 1.5;
        }

        @keyframes fadeUp {
            from {
                opacity: 0;
                transform: translateY(16px);
            }
            to {
                opacity: 1;
                transform: translateY(0);
            }
        }

        @media (max-width: 480px) {
            body { padding: 16px 12px; }
            .header-card { padding: 28px 18px 24px; }
            .header-card h1 { font-size: 22px; }
            .login-card { padding: 22px 18px; }
        }
    </style>
</head>

<body>
    <div class="login-wrapper">

        <div class="header-card">
            <svg class="geo-deco" viewBox="0 0 200 200" fill="none" xmlns="http://www.w3.org/2000/svg">
                <polygon points="100,10 120,60 175,60 130,90 148,140 100,110 52,140 70,90 25,60 80,60" fill="white" />
                <polygon points="100,35 113,68 148,68 121,87 131,120 100,100 69,120 79,87 52,68 87,68" fill="white" />
            </svg>
            <svg class="geo-deco2" viewBox="0 0 120 120" fill="none" xmlns="http://www.w3.org/2000/svg">
                <circle cx="60" cy="60" r="55" stroke="white" stroke-width="2" fill="none" />
                <circle cx="60" cy="60" r="40" stroke="white" stroke-width="1.5" fill="none" />
                <circle cx="60" cy="60" r="25" stroke="white" stroke-width="1" fill="none" />
            </svg>

            <span class="header-icon">🕌</span>
            <h1>Checklist Sholat</h1>
            <p>Masuk untuk mulai mencatat ibadah sholatmu hari ini</p>
        </div>

        <div class="login-card">
            <p class="login-label">Masuk ke Akunmu</p>

            <button class="btn-google" id="btn-google">
                <svg width="18" height="18" viewBox="0 0 48 48">
                    <path fill="#EA4335" d="M24 9.5c3.54 0 6.71 1.22 9.21 3.6l6.85-6.85C35.9 2.38 30.47 0 24 0 14.62 0 6.51 5.38 2.56 13.22l7.98 6.19C12.43 13.72 17.74 9.5 24 9.5z"/>
                    <path fill="#4285F4" d="M46.98 24.55c0-1.57-.15-3.09-.38-4.55H24v9.02h12.94c-.58 2.96-2.26 5.48-4.78 7.18l7.73 6c4.51-4.18 7.09-10.36 7.09-17.65z"/>
                    <path fill="#FBBC05" d="M10.53 28.59c-.48-1.45-.76-2.99-.76-4.59s.27-3.14.76-4.59l-7.98-6.19C.92 16.46 0 20.12 0 24c0 3.88.92 7.54 2.56 10.78l7.97-6.19z"/>
                    <path fill="#34A853" d="M24 48c6.48 0 11.93-2.13 15.89-5.81l-7.73-6c-2.15 1.45-4.92 2.3-8.16 2.3-6.26 0-11.57-4.22-13.47-9.91l-7.98 6.19C6.51 42.62 14.62 48 24 48z"/>
                </svg>
                Masuk dengan Google
            </button>

            <div class="divider"><span>info</span></div>

            <p class="login-info">
                Data sholatmu tersimpan aman di server. Gunakan akun Google untuk masuk dan mulai mencatat.
            </p>

            <div class="login-status" id="login-status"></div>
        </div>

        <p class="footer-note">Checklist Sholat Harian v1.0<br>Tarakan, Kalimantan Utara</p>

    </div>

    <script type="module">
        import { initializeApp } from "https://www.gstatic.com/firebasejs/10.8.1/firebase-app.js";
        import { getAuth, signInWithPopup, GoogleAuthProvider, onAuthStateChanged } from "https://www.gstatic.com/firebasejs/10.8.1/firebase-auth.js";

        const firebaseConfig = {
            apiKey: "AIzaSyBLXut5CS5VfaKXCvERMq0Y04RcyurQarc",
            authDomain: "login-sholat.firebaseapp.com",
            projectId: "login-sholat",
            storageBucket: "login-sholat.firebasestorage.app",
            messagingSenderId: "834035877874",
            appId: "1:834035877874:web:bb2a0ecf3621ba546b8d6b"
        };

        const app = initializeApp(firebaseConfig);
        const auth = getAuth(app);
        const provider = new GoogleAuthProvider();
        const statusEl = document.getElementById('login-status');

        onAuthStateChanged(auth, (user) => {
            if (user) {
                window.location.href = "index.html";
            }
        });

        document.getElementById('btn-google').addEventListener('click', () => {
            statusEl.textContent = '⏳ Menghubungkan ke Google...';
            statusEl.className = 'login-status loading';

            signInWithPopup(auth, provider)
                .then(() => {
                    statusEl.textContent = '✅ Berhasil! Mengalihkan...';
                    statusEl.className = 'login-status loading';
                })
                .catch((error) => {
                    if (error.code === 'auth/popup-closed-by-user') {
                        statusEl.textContent = '⚠️ Popup ditutup. Silakan coba lagi.';
                    } else {
                        statusEl.textContent = '❌ Gagal masuk. Coba lagi nanti.';
                    }
                    statusEl.className = 'login-status error';
                });
        });
    </script>

</body>

</html>
